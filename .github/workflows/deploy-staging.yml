name: Deploy to Staging

on:
  push:
    tags:
      - 'staging-*'

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: copilot-portal-node-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to staging
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config container set \
              --name "${{ secrets.AZURE_WEBAPP_NAME_STAGING }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --container-image-name "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
              --container-registry-url "https://${{ secrets.ACR_LOGIN_SERVER }}" \
              --container-registry-user "${{ secrets.ACR_USERNAME }}" \
              --container-registry-password "${{ secrets.ACR_PASSWORD }}"

            az webapp config appsettings set \
              --name "${{ secrets.AZURE_WEBAPP_NAME_STAGING }}" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --settings WEBSITES_PORT=8080
